<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../mainstyle.css">
    <link rel="stylesheet" href="secret.css">
    <link rel="icon" href="../title.png">
    <meta name="viewport" content="width=device-width, initial-scale=0.5">
    <title>██</title>
</head>

<body>
    <div id="news">
        <a href="../index.html">
        <div>
            <div style="height: 0px;">
                <div style="text-align: center; margin: auto; margin-top: 10%; font-style: italic; color: blue; filter: url(#disp); opacity: 0.7;">
                    <p style="font-size: 18px;">17歳高校生が行方不明　██県██町</p>
                    <p style="width: 500px; margin: auto; padding: 0.5em;">█月█日午後、██町に住む17歳の高校生████さんが自宅に帰宅せず行方不明となった。██さんは午後5時ごろに学校から一人で出ていく様子を同級生から目撃されている。その後学校から2㎞程離れた場所を歩いている姿が監視カメラに写っていたことが確認された。
                    </p>
                    <p style="width: 500px; margin: auto; padding: 0.5em;">翌█日午後、██ダム付近にて██さんの私物と見られる携帯電話や通学用の鞄が散乱しているのが発見される。
                    </p>
                    <p style="width: 500px; margin: auto; padding: 0.5em;">警察は周辺の防犯カメラの確認や関係者への聞き取りを進め、事件・事故両面で捜査を行っている。</p>
                </div>
            </div>
            <div style="width: 250px; height:0px; image-rendering:pixelated; margin: auto; position: relative; z-index: -1;">
                <img src="../imag/nagori/news.png" alt="" width="250">
            </div>
    
        </div>
        </a>
        <svg style="position:absolute">
            <filter id = "disp">
                <feTurbulence baseFrequency = "0 0.01"result = "noise" id="noise"/>
                <feDisplacementMap
                    in = "SourceGraphic"
                    in2 = "noise"
                    scale = "50"
                />
            </filter>
        </svg>
    </div>

    <script>
        const noise = document.getElementById('noise');
        const disp = document.getElementById("dn");
        let rand = Math.random();
        setInterval(() => {
            rand = Math.floor(Math.random()*10);
            noise.setAttribute("seed", rand *100);
            noise.setAttribute("baseFrequency", `0 ${rand/5}`);
        }, 500);
        
        const entries = performance.getEntriesByType('navigation');
        const newsID = document.getElementById('news');
        entries.forEach((entry) => {
        if (entry.type === 'back_forward' || entry.type === 'reload') {
            newsID.innerHTML = '<div style="text-align: center; margin: auto; margin-top: 10%; font-style: italic;">404 not found</div>';
            document.body.style.background = "blue";
        }
        });

    </script>

</body>

</html>
